name: Sensor CI

on:
  push:
  pull_request:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sensor simulation briefly
        run: |
          timeout 8s python sensor.py
          code=$?
          if [ $code -eq 0 ] || [ $code -eq 124 ]; then
            exit 0
          else
            exit $code
          fi
